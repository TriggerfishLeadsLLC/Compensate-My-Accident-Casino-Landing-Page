<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Direction 3 — Prize Game-Show</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--gold:#ffd23f;--red:#ff3b6b;--purp:#7a1fd0}
*{box-sizing:border-box}
body{margin:0;font-family:Fredoka,system-ui,sans-serif;color:#fff;min-height:100vh;background:#2a0a5e;
background-image:radial-gradient(60% 40% at 50% -5%,rgba(255,210,63,.4),transparent 60%),conic-gradient(from 200deg at 50% 0%,rgba(255,255,255,.06) 0 10deg,transparent 10deg 30deg,rgba(255,255,255,.06) 30deg 40deg,transparent 40deg 60deg),linear-gradient(160deg,#3a0b78,#1a0540)}
.wrap{max-width:520px;margin:0 auto;padding:24px 18px 60px;text-align:center}
.eyebrow{font-weight:700;font-size:13px;letter-spacing:.1em;color:var(--gold);text-transform:uppercase}
h1{font-family:'Luckiest Guy',cursive;font-weight:400;font-size:clamp(34px,9.5vw,54px);line-height:1.02;margin:8px 0 2px;color:var(--gold);text-shadow:0 3px 0 #b81e4f,0 0 26px rgba(255,210,63,.5);letter-spacing:.01em}
.score-card{margin:18px 0;padding:22px;border-radius:22px;background:rgba(255,255,255,.07);border:2px solid var(--gold);box-shadow:0 0 40px rgba(255,210,63,.25)}
.score-label{font-weight:700;font-size:12px;letter-spacing:.16em;color:#ffe9a3;text-transform:uppercase}
.score{font-family:'Luckiest Guy',cursive;font-size:clamp(52px,17vw,82px);line-height:1;margin:6px 0;color:#fff;text-shadow:0 0 14px var(--gold),0 4px 0 #c98a00}
.bar{height:12px;border-radius:99px;background:rgba(0,0,0,.3);overflow:hidden}
.bar>i{display:block;height:100%;width:14%;background:linear-gradient(90deg,var(--gold),#ffa53f)}
.q{font-family:'Luckiest Guy',cursive;font-size:clamp(22px,6vw,30px);margin:24px 0 4px;text-shadow:0 2px 0 var(--purp)}
.sub{color:#e7d4ff;margin:0 0 18px;font-size:15px}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{display:flex;align-items:center;gap:12px;padding:18px 16px;border-radius:16px;font-weight:700;font-size:17px;text-align:left;color:#3a0b78;background:linear-gradient(180deg,#fff,#ffe9c2);border:2px solid var(--gold);box-shadow:0 6px 0 #c98a00}
.tile .ic{font-size:24px}
.cta{margin-top:24px;width:100%;padding:17px;border:none;border-radius:16px;font-family:'Luckiest Guy',cursive;font-size:20px;color:#5a1200;background:linear-gradient(180deg,var(--gold),#ffa53f);box-shadow:0 6px 0 #c98a00,0 0 30px rgba(255,210,63,.5)}
.tag{position:fixed;top:10px;left:10px;font-size:10px;letter-spacing:.1em;color:#e7d4ff;background:rgba(0,0,0,.3);padding:5px 10px;border-radius:8px}
</style></head><body>
<div class="tag">DIRECTION 3 · PRIZE GAME-SHOW</div>
<div class="wrap">
<div class="eyebrow">🎰 AI CLAIM CALCULATOR 🎰</div>
<h1>What's Your<br>Claim Worth?</h1>
<div class="score-card"><div class="score-label">Estimated Case Value</div><div class="score">$0</div><div class="bar"><i></i></div></div>
<div class="q">What type of accident?</div>
<p class="sub">Tap one to spin up your estimate!</p>
<div class="tiles">
<div class="tile"><span class="ic">🚗</span>Car</div>
<div class="tile"><span class="ic">🏍️</span>Motorcycle</div>
<div class="tile"><span class="ic">🚚</span>Truck</div>
<div class="tile"><span class="ic">🚶</span>Pedestrian</div>
<div class="tile"><span class="ic">🚲</span>Bicycle</div>
<div class="tile"><span class="ic">👷</span>At work</div>
</div>
</div></body></html>

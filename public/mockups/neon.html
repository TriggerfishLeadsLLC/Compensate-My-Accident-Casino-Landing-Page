<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Direction 1 — Neon Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--mag:#ff2bd6;--cyan:#18f0ff;--vio:#8b2bff}
*{box-sizing:border-box}
body{margin:0;font-family:Rajdhani,system-ui,sans-serif;color:#eaf6ff;background:#06060f;min-height:100vh;
background-image:radial-gradient(40% 40% at 15% 8%,rgba(255,43,214,.28),transparent 60%),radial-gradient(45% 45% at 92% 4%,rgba(24,240,255,.24),transparent 60%),radial-gradient(55% 50% at 50% 105%,rgba(139,43,255,.26),transparent 60%)}
.wrap{max-width:520px;margin:0 auto;padding:26px 18px 60px;text-align:center}
.eyebrow{font-family:Orbitron;font-weight:700;font-size:11px;letter-spacing:.38em;color:var(--cyan);text-transform:uppercase;text-shadow:0 0 10px var(--cyan)}
h1{font-family:Orbitron;font-weight:900;font-size:clamp(30px,8.5vw,48px);line-height:1.04;margin:12px 0 4px;text-transform:uppercase;background:linear-gradient(90deg,#fff,#ffb3f0);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 18px rgba(255,43,214,.55))}
.score-card{margin:20px 0;padding:22px;border-radius:18px;border:1.5px solid rgba(24,240,255,.5);background:rgba(10,10,28,.6);box-shadow:inset 0 0 34px rgba(24,240,255,.14),0 0 26px rgba(255,43,214,.16)}
.score-label{font-family:Orbitron;font-size:10px;letter-spacing:.3em;color:#9fb4d6;text-transform:uppercase}
.score{font-family:Orbitron;font-weight:900;font-size:clamp(50px,17vw,78px);line-height:1;margin:8px 0;color:#fff;text-shadow:0 0 12px var(--cyan),0 0 30px var(--mag)}
.bar{height:10px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
.bar>i{display:block;height:100%;width:13%;background:linear-gradient(90deg,var(--mag),var(--cyan));box-shadow:0 0 14px var(--cyan)}
.q{font-family:Orbitron;font-weight:700;font-size:clamp(20px,5.6vw,27px);margin:28px 0 4px}
.sub{color:#9fb4d6;margin:0 0 18px;font-size:15px}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{display:flex;align-items:center;gap:12px;padding:18px 16px;border-radius:14px;font-weight:700;font-size:17px;text-align:left;background:linear-gradient(180deg,#171738,#0c0c20);border:1.5px solid rgba(139,43,255,.55);box-shadow:0 0 18px rgba(139,43,255,.16)}
.tile .ic{font-size:24px}
.cta{margin-top:24px;width:100%;padding:17px;border:none;border-radius:14px;font-family:Orbitron;font-weight:900;font-size:17px;text-transform:uppercase;letter-spacing:.05em;color:#0a0014;background:linear-gradient(90deg,var(--cyan),var(--mag));box-shadow:0 0 26px rgba(24,240,255,.5)}
.tag{position:fixed;top:10px;left:10px;font-family:Orbitron;font-size:10px;letter-spacing:.2em;color:#7b8aa6;background:#0d0d22;padding:5px 10px;border-radius:8px;border:1px solid #23234a}
</style></head><body>
<div class="tag">DIRECTION 1 · NEON ARCADE</div>
<div class="wrap">
<div class="eyebrow">◇ AI CLAIM CALCULATOR ◇</div>
<h1>What's Your<br>Claim Worth?</h1>
<div class="score-card"><div class="score-label">Estimated Case Value</div><div class="score">$0</div><div class="bar"><i></i></div></div>
<div class="q">What type of accident?</div>
<p class="sub">Tap one to start your estimate</p>
<div class="tiles">
<div class="tile"><span class="ic">🚗</span>Car</div>
<div class="tile"><span class="ic">🏍️</span>Motorcycle</div>
<div class="tile"><span class="ic">🚚</span>Truck</div>
<div class="tile"><span class="ic">🚶</span>Pedestrian</div>
<div class="tile"><span class="ic">🚲</span>Bicycle</div>
<div class="tile"><span class="ic">👷</span>At work</div>
</div>
</div></body></html>

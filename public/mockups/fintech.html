<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Direction 2 — Bright Fintech</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--green:#00c46a;--ink:#0f1726;--muted:#697a90;--line:#e7edf5}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,sans-serif;color:var(--ink);background:#f3f6fb;min-height:100vh}
.wrap{max-width:500px;margin:0 auto;padding:30px 18px 60px;text-align:center}
.eyebrow{display:inline-block;font-weight:700;font-size:12px;color:var(--green);background:#e4f9ee;padding:5px 12px;border-radius:99px}
h1{font-weight:900;font-size:clamp(30px,8vw,44px);line-height:1.06;letter-spacing:-.02em;margin:14px 0 6px}
.sub0{color:var(--muted);font-size:16px;margin:0 0 18px;max-width:30ch;margin-inline:auto}
.score-card{margin:8px 0 24px;padding:26px 22px;border-radius:24px;background:#fff;border:1px solid var(--line);box-shadow:0 24px 50px -28px rgba(20,40,80,.28)}
.score-label{font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--muted);text-transform:uppercase}
.score{font-weight:900;font-size:clamp(48px,15vw,72px);line-height:1;margin:6px 0 14px;color:var(--green);letter-spacing:-.02em}
.bar{height:10px;border-radius:99px;background:#eef2f7;overflow:hidden}
.bar>i{display:block;height:100%;width:13%;border-radius:99px;background:linear-gradient(90deg,#00c46a,#37e08a)}
.q{font-weight:800;font-size:clamp(21px,5.6vw,28px);letter-spacing:-.01em;margin:24px 0 4px}
.sub{color:var(--muted);margin:0 0 18px;font-size:15px}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{display:flex;align-items:center;gap:12px;padding:18px 16px;border-radius:18px;font-weight:700;font-size:17px;text-align:left;background:#fff;border:1px solid var(--line);box-shadow:0 10px 24px -18px rgba(20,40,80,.3)}
.tile .ic{width:38px;height:38px;border-radius:11px;background:#e9f0fb;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.cta{margin-top:24px;width:100%;padding:17px;border:none;border-radius:16px;font-family:inherit;font-weight:800;font-size:18px;color:#fff;background:var(--green);box-shadow:0 16px 30px -14px rgba(0,196,106,.6)}
.tag{position:fixed;top:10px;left:10px;font-size:10px;letter-spacing:.1em;color:#8a99ad;background:#fff;padding:5px 10px;border-radius:8px;border:1px solid var(--line)}
</style></head><body>
<div class="tag">DIRECTION 2 · BRIGHT FINTECH</div>
<div class="wrap">
<div class="eyebrow">⚡ AI Claim Calculator</div>
<h1>What's your claim worth?</h1>
<p class="sub0">Answer a few questions, watch your estimate add up in real time.</p>
<div class="score-card"><div class="score-label">Estimated case value</div><div class="score">$0</div><div class="bar"><i></i></div></div>
<div class="q">What type of accident?</div>
<p class="sub">Tap one to begin</p>
<div class="tiles">
<div class="tile"><span class="ic">🚗</span>Car</div>
<div class="tile"><span class="ic">🏍️</span>Motorcycle</div>
<div class="tile"><span class="ic">🚚</span>Truck</div>
<div class="tile"><span class="ic">🚶</span>Pedestrian</div>
<div class="tile"><span class="ic">🚲</span>Bicycle</div>
<div class="tile"><span class="ic">👷</span>At work</div>
</div>
</div></body></html>
